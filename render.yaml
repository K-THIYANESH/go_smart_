services:
  - type: web
    name: go-smart
    env: python
    plan: free
    buildCommand: |
      # Build Frontend
      cd frontend
      npm install
      npm run build
      cd ..
      # Install Backend Deps
      pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.x
