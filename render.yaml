services:
  - type: web
    name: go-smart-chennai
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn api_server_v2:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: NODE_VERSION
        value: 18.16.0
    autoDeploy: true
    plan: free
    healthCheckPath: /api/health
